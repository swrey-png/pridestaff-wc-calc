<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  body { margin: 0; font-family: 'DM Sans', sans-serif; background: #0f1117; overscroll-behavior: none; }
  .mono { font-family: 'DM Mono', monospace; }

  /* Safe area for notched phones */
  .safe-top    { padding-top: env(safe-area-inset-top, 0px); }
  .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom, 0px), 16px); }

  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

    .no-print { display: none !important; }

    body {
      background: white !important;
      font-family: 'DM Sans', Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Hide everything except the print card */
    #root { display: none !important; }
    #print-quote { display: block !important; position: static !important; }

    #print-quote {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: white;
      padding: 32px 40px;
      font-size: 13px;
      color: #111;
    }

    .pq-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 2px solid #1d4ed8;
      padding-bottom: 12px;
      margin-bottom: 20px;
    }
    .pq-logo { font-size: 18px; font-weight: 700; color: #1d4ed8; }
    .pq-sub  { font-size: 11px; color: #666; margin-top: 2px; }
    .pq-date { font-size: 11px; color: #999; text-align: right; }

    .pq-section { margin-bottom: 16px; }
    .pq-section-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 8px;
      border-bottom: 1px solid #eee;
      padding-bottom: 4px;
    }

    .pq-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .pq-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    .pq-field { margin-bottom: 4px; }
    .pq-label { font-size: 10px; color: #888; margin-bottom: 2px; }
    .pq-value { font-size: 14px; font-weight: 600; color: #111; }
    .pq-value-mono { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 600; color: #111; }

    .pq-result-box {
      background: #f0f4ff;
      border: 1.5px solid #1d4ed8;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .pq-bill-rate { font-size: 32px; font-weight: 700; color: #1d4ed8; font-family: 'DM Mono', monospace; }
    .pq-bill-label { font-size: 11px; color: #666; margin-bottom: 4px; }

    .pq-gm-good { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-block; }
    .pq-gm-warn { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-block; }
    .pq-gm-bad  { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-block; }

    .pq-waterfall { width: 100%; border-collapse: collapse; }
    .pq-waterfall td { padding: 5px 0; font-size: 12px; border-bottom: 1px solid #f0f0f0; }
    .pq-waterfall td:last-child { text-align: right; font-family: 'DM Mono', monospace; font-weight: 600; }
    .pq-waterfall .pq-wf-total td { border-top: 2px solid #333; border-bottom: none; font-weight: 700; font-size: 13px; }

  .wc-dropdown::-webkit-scrollbar-track { background: transparent; }
  .wc-dropdown::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

  .wc-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);

  .wc-item:hover, .wc-item:active { background: rgba(59,130,246,0.15); }
  .wc-item:last-child { border-bottom: none; }

  .field {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: white;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 15px;
    font-family: 'DM Mono', monospace;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .field:focus { border-color: #3b82f6; }
  .field::placeholder { color: rgba(255,255,255,0.25); }

  .chip {
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.05);
    white-space: nowrap;
    -webkit-appearance: none;
  }
  .chip:hover { border-color: #3b82f6; color: #93c5fd; }
  .chip.active { background: #1d4ed8; border-color: #3b82f6; color: white; }

  .wf-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }
  .wf-row:last-child { border-bottom: none; }

  .gm-good { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
  .gm-warn { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .gm-bad  { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 12px;
  }

  @keyframes popIn {
    0% { transform: scale(0.95); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop { animation: popIn 0.15s ease-out; }

  /* Install banner */
  .install-banner {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #1e2130;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding: 14px 20px;
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideUp 0.3s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  /* Update banner */
  .update-banner {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #1d4ed8;
    color: white;
    padding: 10px 20px;
    padding-top: max(10px, env(safe-area-inset-top));
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 500;
  }
</style>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

      {code:'WC8868',name:'College - Prof. Ees',decimal:0.0096426},
      {code:'WC9015',name:'BLDG OPER-INCL JANITORIAL',decimal:0.0657325},

      // Format: {code:'WCXXXX', name:'Job Description', decimal:0.XXXXX},
      // To add: get the rate from PrideStaff corporate WC sheet, divide by 100 for decimal
      // Example: 8.50% rate → decimal: 0.08500
    ]
  }
  // Additional states added here as WC files are provided
  // TX: { name: 'Texas', burden: 0.XXXX, codes: [...] }
  // AZ: { name: 'Arizona', burden: 0.XXXX, codes: [...] }
};

const ANNUAL_HOURS = 2080;
const QUICK_ADD_ON = 5.00;

const fmt2 = n => n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD = n => '$' + fmt2(n);
const fmtP = n => n.toFixed(2) + '%';

function gmClass(gm) {
  if (gm >= 17 && gm <= 21) return 'gm-good';
  if (gm >= 14 && gm <= 24) return 'gm-warn';
  return 'gm-bad';
}
function gmLabel(gm) {
  if (gm >= 17 && gm <= 21) return '✓ On Target';
  if (gm < 14) return '↓ Too Low';
  if (gm > 24) return '↑ Above Range';
  return gm < 17 ? '↓ Below' : '↑ Above';
}

function GMBadge({ gm }) {
  return (
    <span className={`mono ${gmClass(gm)}`} style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,fontWeight:700,padding:'3px 9px',borderRadius:20}}>
      {fmtP(gm)} · {gmLabel(gm)}
    </span>
  );
}

function WCSelector({ codes, selectedCode, onSelect }) {
  const [search, setSearch] = useState('');
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  const filtered = codes.filter(c =>
    !search || c.code.toLowerCase().includes(search.toLowerCase()) || c.name.toLowerCase().includes(search.toLowerCase())
  ).slice(0, 40);

  return (
    <div ref={ref} style={{position:'relative'}}>
      <label style={{fontSize:11,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)',display:'block',marginBottom:6}}>
        Workers Comp Code
      </label>
      <input
        className="field"
        value={open ? search : (selectedCode ? `${selectedCode.code} – ${selectedCode.name}` : search)}
        onChange={e => { setSearch(e.target.value); setOpen(true); if (!e.target.value) onSelect(null); }}
        onFocus={() => { setSearch(''); setOpen(true); }}
        placeholder="Search code or job type…"
      />
      {open && (
        <div className="wc-dropdown">
          {filtered.length === 0 ? (
            <div style={{padding:'10px 14px',fontSize:12,color:'rgba(255,255,255,0.3)'}}>No codes found</div>
          ) : filtered.map(c => (
            <div key={c.code} className="wc-item" onClick={() => { onSelect(c); setSearch(''); setOpen(false); }}>
              <div>
                <span style={{fontSize:11,fontWeight:700,color:'#60a5fa',marginRight:8,fontFamily:'DM Mono'}}>{c.code}</span>
                <span style={{fontSize:12,color:'rgba(255,255,255,0.7)'}}>{c.name}</span>
              </div>
              <span style={{fontSize:11,color:'rgba(255,255,255,0.35)',fontFamily:'DM Mono',flexShrink:0,marginLeft:8}}>{(c.decimal*100).toFixed(2)}%</span>
            </div>
          ))}
        </div>
      )}
      {selectedCode && !open && (
        <div style={{display:'flex',alignItems:'center',gap:8,marginTop:6,flexWrap:'wrap'}}>
          <span style={{background:'rgba(59,130,246,0.2)',border:'1px solid rgba(59,130,246,0.4)',borderRadius:4,padding:'2px 7px',fontSize:11,fontWeight:700,color:'#93c5fd',fontFamily:'DM Mono'}}>{selectedCode.code}</span>
          <span style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>WC: <span style={{color:'rgba(255,255,255,0.7)',fontFamily:'DM Mono'}}>{(selectedCode.decimal*100).toFixed(3)}%</span></span>
          <button onClick={() => { onSelect(null); setSearch(''); }} style={{marginLeft:'auto',background:'none',border:'none',color:'rgba(255,255,255,0.25)',cursor:'pointer',fontSize:14,padding:0}}>✕</button>
        </div>
      )}
    </div>
  );
}

const IL = ({children}) => (
  <label style={{fontSize:11,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)',display:'block',marginBottom:6}}>
    {children}
  </label>
);

function TempCalculator({ stateData }) {
  const [company, setCompany] = useState('');
  const [position, setPosition] = useState('');
  const [payRate, setPayRate] = useState('');
  const [wcCode, setWcCode] = useState(null);
  const [mode, setMode] = useState('quick');
  const [addOn, setAddOn] = useState('5.00');
  const [markup, setMarkup] = useState('1.50');
  const [targetBill, setTargetBill] = useState('');

  const h  = parseFloat(payRate) || 0;
  const ao = parseFloat(addOn) || 0;
  const mu = parseFloat(markup) || 0;
  const tb = parseFloat(targetBill) || 0;
  const wc = wcCode ? wcCode.decimal : 0;
  const BURDEN = stateData.burden;

  const burden        = h * BURDEN;
  const basic         = h + burden;
  const wcCost        = h * wc;
  const fullyBurdened = basic + wcCost;

  const quickBillRate = fullyBurdened + QUICK_ADD_ON;
  const quickGM       = quickBillRate > 0 ? (QUICK_ADD_ON / quickBillRate) * 100 : 0;
  const quickMarkup   = h > 0 ? quickBillRate / h : 0;

  const billA  = fullyBurdened + ao;
  const gmA    = billA > 0 ? (ao / billA) * 100 : 0;
  const muA    = h > 0 ? billA / h : 0;

  const billB  = h * mu;
  const gmB    = billB > 0 ? ((billB - fullyBurdened) / billB) * 100 : 0;
  const addOnB = billB - fullyBurdened;

  const targetGP     = tb - fullyBurdened;
  const targetGM     = tb > 0 ? (targetGP / tb) * 100 : 0;
  const targetMarkup = h > 0 && tb > 0 ? tb / h : 0;
  const targetViable = tb > fullyBurdened;

  const coreReady = h > 0 && wcCode;

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div className="glass" style={{borderRadius:16,padding:20}}>
        <div className="section-label">Quote Details</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div><IL>Company</IL><input className="field" value={company} onChange={e=>setCompany(e.target.value)} placeholder="Company name"/></div>
          <div><IL>Position</IL><input className="field" value={position} onChange={e=>setPosition(e.target.value)} placeholder="Job title"/></div>
        </div>
      </div>

      <div className="glass" style={{borderRadius:16,padding:20}}>
        <div className="section-label">Role Details</div>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div>
            <IL>Candidate Pay Rate / hr</IL>
            <div style={{position:'relative'}}>
              <span style={{position:'absolute',left:14,top:12,color:'rgba(255,255,255,0.4)',fontSize:14}}>$</span>
              <input type="number" min="0" step="0.25" inputMode="decimal" className="field" value={payRate} onChange={e=>setPayRate(e.target.value)} placeholder="0.00" style={{paddingLeft:26}}/>
            </div>
          </div>
          <WCSelector codes={stateData.codes} selectedCode={wcCode} onSelect={setWcCode}/>
        </div>
      </div>

      <div className="glass" style={{borderRadius:16,padding:20}}>
        <div className="section-label">Pricing Method</div>
        <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
          {[
            {id:'quick', label:'⚡ Quick Quote', desc:`FC + $${QUICK_ADD_ON.toFixed(2)}`},
            {id:'advanced', label:'⚙ Advanced', desc:'Add-on or Markup'},
            {id:'target', label:'🎯 Target Rate', desc:'Work backward'},
          ].map(m => (
            <button key={m.id} onClick={()=>setMode(m.id)}
              style={{
                flex:1,minWidth:90,padding:'10px 8px',borderRadius:10,cursor:'pointer',
                border: mode===m.id ? '1px solid #3b82f6' : '1px solid rgba(255,255,255,0.1)',
                background: mode===m.id ? 'rgba(29,78,216,0.35)' : 'rgba(255,255,255,0.04)',
                textAlign:'center',transition:'all 0.15s'
              }}>
              <div style={{fontSize:12,fontWeight:600,color: mode===m.id ? '#93c5fd' : 'rgba(255,255,255,0.6)'}}>{m.label}</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,0.3)',marginTop:3}}>{m.desc}</div>
            </button>
          ))}
        </div>

        {mode === 'quick' && (

  const [showUpdate, setShowUpdate] = useState(false);

  const stateKeys = Object.keys(WC_CODES_BY_STATE);
  const stateData = WC_CODES_BY_STATE[state];

  // Capture Android install prompt
  useEffect(() => {
    const handler = e => { e.preventDefault(); setInstallPrompt(e); setShowInstall(true); };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  // Listen for SW update
  useEffect(() => {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(reg => {
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              setShowUpdate(true);
            }
          });
        });
      });
    }
  }, []);

  const handleInstall = async () => {
    if (installPrompt) {
      installPrompt.prompt();
      const { outcome } = await installPrompt.userChoice;
      if (outcome === 'accepted') setShowInstall(false);
    }
  };

  const handleUpdate = () => {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(reg => {
        if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      });
    }
    window.location.reload();
  };

  return (
    <>
      {showUpdate && (
        <div className="update-banner no-print">
          <span>⬆ Update available</span>
          <button onClick={handleUpdate} style={{background:'rgba(255,255,255,0.2)',border:'none',color:'white',borderRadius:8,padding:'4px 12px',fontSize:12,fontWeight:700,cursor:'pointer'}}>
            Refresh
          </button>
        </div>
      )}

      <div style={{minHeight:'100vh',background:'#0f1117',paddingTop: showUpdate ? 44 : 0}}>
        <div style={{maxWidth:560,margin:'0 auto',padding:'16px 16px 100px'}}>

          {/* Header */}
          <div style={{marginBottom:16,paddingTop:8}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:4}}>
              <div style={{width:40,height:40,borderRadius:10,background:'#1d4ed8',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:20}}>📋</div>
              <div>
                <div style={{fontSize:17,fontWeight:700,color:'white',lineHeight:1.2}}>PrideStaff WC · Quote Calc</div>
                <div style={{fontSize:11,color:'rgba(255,255,255,0.35)',marginTop:2}}>CA 2026 · Basic Burden {(stateData.burden*100).toFixed(2)}% · {stateData.codes.length} WC Codes</div>
              </div>
              {/* State selector — shows when multiple states are available */}
              {stateKeys.length > 1 && (
                <select value={state} onChange={e=>setState(e.target.value)}
                  style={{marginLeft:'auto',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.12)',color:'white',borderRadius:8,padding:'6px 10px',fontSize:12,fontFamily:'DM Sans'}}>
                  {stateKeys.map(k=><option key={k} value={k}>{k}</option>)}
                </select>
              )}
            </div>
          </div>

          {/* Tab switcher */}
          <div className="glass no-print" style={{borderRadius:12,padding:'4px',display:'flex',gap:4,marginBottom:16}}>
            {[{id:'temp',label:'Temp / Temp-to-Hire'},{id:'dh',label:'Direct Hire'}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{
                  flex:1,padding:'11px 0',borderRadius:9,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',transition:'all 0.15s',
                  background: tab===t.id ? '#1d4ed8' : 'transparent',
                  color: tab===t.id ? 'white' : 'rgba(255,255,255,0.4)',
                  boxShadow: tab===t.id ? '0 2px 8px rgba(29,78,216,0.4)' : 'none',
                }}>
                {t.label}
              </button>
            ))}
          </div>

          {tab === 'temp' ? <TempCalculator stateData={stateData}/> : <DHCalculator/>}

          <div className="no-print" style={{textAlign:'center',marginTop:20,fontSize:11,color:'rgba(255,255,255,0.15)'}}>
            PrideStaff Walnut Creek · Internal Use Only · v1.0
          </div>
        </div>
      </div>

      {/* Android install banner */}
      {showInstall && (
        <div className="install-banner no-print">
          <div style={{width:36,height:36,borderRadius:8,background:'#1d4ed8',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:18}}>📋</div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:'white'}}>Install PrideStaff WC</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.5)',marginTop:1}}>Add to home screen for quick access</div>
          </div>
          <button onClick={handleInstall}
            style={{background:'#1d4ed8',border:'none',color:'white',borderRadius:8,padding:'8px 16px',fontSize:13,fontWeight:700,cursor:'pointer',flexShrink:0}}>
            Install
          </button>
          <button onClick={()=>setShowInstall(false)}
            style={{background:'none',border:'none',color:'rgba(255,255,255,0.3)',cursor:'pointer',fontSize:18,padding:'0 4px',flexShrink:0}}>
            ✕
          </button>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
</body>
</html>
